info:
  name: create Quiz
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/quiz
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "numberOfQuestions": "FIVE",
        "difficulty": "BEGINNER",
        "topic": "linear algebra"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("quizId",res.body.id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
