info:
  name: Chat
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/chat
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "numberOfQuestions": "FIVE",
        "difficulty": "BEGINNER",
        "topic": "kotlin"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
